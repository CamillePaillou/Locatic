name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/camillepaillou/locatic

jobs:
  # Stage "tests" : compile et lance dotnet test nativement (pas via Docker),
  # pour un retour rapide et un nom de check clair à rendre obligatoire
  # dans la protection de branche.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('app/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore app/Locatic.sln

      - name: Build
        run: dotnet build app/Locatic.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test app/Locatic.sln --no-build --configuration Release

  # Stage "scan du dépôt" : cherche des secrets committés par erreur et des
  # mauvaises pratiques dans le Dockerfile. Ne dépend ni du build .NET ni de
  # l'image Docker, donc tourne en parallèle de `test` pour un retour rapide.
  # Complémentaire du scan d'image ci-dessous (angle différent : le code
  # source, pas les paquets installés dans l'image finale).
  source-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan du dépôt (secrets, config Dockerfile)
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          scan-type: 'fs'
          scan-ref: 'app/'
          scanners: 'vuln,secret,config'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          format: 'table'
          version: v0.72.0

  # Stage "build" + "scan d'image" : construit l'image Docker (sans la
  # publier) et la scanne avec Trivy. Les deux sont regroupés dans le même
  # job car ils travaillent sur la même image fraîchement construite : la
  # séparer en deux jobs forcerait soit un rebuild inutile, soit un transfert
  # d'artefact entre jobs pour rien.
  build:
    needs: [test, source-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (chargée localement, pas publiée)
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: false
          load: true
          tags: locatic:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan de sécurité de l'image (Trivy)
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          image-ref: locatic:${{ github.sha }}
          # La version par défaut de cette action (v0.65.0) correspond à une
          # release Trivy supprimée du dépôt GitHub : le téléchargement du
          # binaire échoue silencieusement. On force une version toujours
          # disponible (https://github.com/aquasecurity/setup-trivy/issues/30).
          version: v0.72.0
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          format: 'table'

  # Stage "publication" : republie l'image (reconstruite via le cache GHA,
  # donc quasi instantané) et la pousse sur GHCR, uniquement quand le code
  # est réellement intégré à main (jamais depuis une simple pull request).
  publish:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # Nécessaire pour construire l'image arm64 par émulation : le runner
      # GitHub est en amd64, mais minikube tourne en arm64 sur les Mac Apple
      # Silicon. Sans ça, l'image publiée n'existe qu'en amd64 et le pull
      # échoue sur ces machines avec "no matching manifest for linux/arm64".
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Connexion à GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Métadonnées de l'image (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build et push (multi-architecture)
        uses: docker/build-push-action@v5
        with:
          context: ./app
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
