name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/camillepaillou/locatic

jobs:
  # Stage "tests" : compile et lance dotnet test nativement (pas via Docker),
  # pour un retour rapide et un nom de check clair à rendre obligatoire
  # dans la protection de branche.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('app/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore app/Locatic.sln

      - name: Build
        run: dotnet build app/Locatic.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test app/Locatic.sln --no-build --configuration Release

  # Stage "build" + "scan" : construit l'image Docker (sans la publier) et la
  # scanne avec Trivy. Les deux sont regroupés dans le même job car ils
  # travaillent sur la même image fraîchement construite : la séparer en deux
  # jobs forcerait soit un rebuild inutile, soit un transfert d'artefact entre
  # jobs pour rien.
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (chargée localement, pas publiée)
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: false
          load: true
          tags: locatic:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan de sécurité de l'image (Trivy)
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: locatic:${{ github.sha }}
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          format: 'table'

  # Stage "publication" : republie l'image (reconstruite via le cache GHA,
  # donc quasi instantané) et la pousse sur GHCR, uniquement quand le code
  # est réellement intégré à main (jamais depuis une simple pull request).
  publish:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Connexion à GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Métadonnées de l'image (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build et push
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
