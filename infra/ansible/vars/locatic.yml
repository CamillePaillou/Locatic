# Point d'entrée unique pour configurer le déploiement Kubernetes de Locatic.
# Modifier une valeur ici suffit : le playbook rend les templates et les
# réapplique, pas besoin de toucher aux fichiers .yaml.j2 eux-mêmes.

# --- Application ------------------------------------------------------
app_image_repository: ghcr.io/camillepaillou/locatic
app_image_tag: latest
app_replicas: 2

app_env:
  ASPNETCORE_ENVIRONMENT: Production

app_resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

# Chemin où le volume persistant SQLite (créé par Terraform) est monté
# dans le conteneur applicatif.
sqlite_mount_path: /data

# --- Nginx (reverse proxy) ---------------------------------------------
nginx_image: "nginx:1.27-alpine"

nginx_resources:
  requests:
    cpu: "50m"
    memory: "32Mi"
  limits:
    cpu: "200m"
    memory: "64Mi"

# Sidecar qui convertit le stub_status de Nginx (format texte propriétaire)
# en métriques Prometheus, exposées sur son propre port.
nginx_exporter_image: "nginx/nginx-prometheus-exporter:1.5.1"
nginx_exporter_port: 9113
nginx_exporter_resources:
  requests:
    cpu: "20m"
    memory: "16Mi"
  limits:
    cpu: "100m"
    memory: "32Mi"

# NodePort (simple sur minikube, via `minikube service`) ou LoadBalancer
# (nécessite `minikube tunnel` en tâche de fond).
service_type: NodePort

# --- Registry privée (GHCR) ---------------------------------------------
# Le secret d'accès (username/token) est construit à partir des variables
# d'environnement GHCR_USERNAME/GHCR_TOKEN au moment de lancer le playbook,
# jamais stocké ici ni dans un fichier.
ghcr_registry: ghcr.io

# --- Monitoring (étape 17) ----------------------------------------------
metrics_port: 8080
metrics_path: /metrics

# Namespace séparé de "locatic" : le monitoring n'est pas un composant
# applicatif, convention standard de le garder à part.
monitoring_namespace: monitoring
monitoring_chart_version: "87.5.1"
monitoring_service_type: NodePort
monitoring_retention: "3d"
monitoring_prometheus_resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"
