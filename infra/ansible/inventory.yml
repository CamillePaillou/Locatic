all:
  hosts:
    localhost:
      ansible_connection: local
      # Utilise le même interpréteur Python que celui qui exécute
      # ansible-playbook (là où vit le client Python kubernetes), plutôt que
      # de laisser Ansible deviner un python3 système qui peut ne pas l'avoir.
      ansible_python_interpreter: "{{ ansible_playbook_python }}"
