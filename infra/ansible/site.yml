---
- name: Orchestrer le déploiement local de Locatic sur minikube
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    terraform_dir: "{{ playbook_dir }}/../terraform"
    kubernetes_manifests_dir: "{{ playbook_dir }}/../kubernetes/templates"
    kube_context: minikube

  vars_files:
    - vars/locatic.yml

  tasks:
    # --- 1. Prérequis ---------------------------------------------------
    - name: Vérifier que les outils nécessaires sont installés
      ansible.builtin.command: "which {{ item }}"
      loop:
        - terraform
        - kubectl
        - minikube
      loop_control:
        label: "{{ item }}"
      register: tool_check
      changed_when: false

    - name: Vérifier que minikube est démarré
      ansible.builtin.command: minikube status
      register: minikube_status
      changed_when: false

    # --- 2. Récupération des sorties Terraform ---------------------------
    - name: Lire les outputs Terraform (namespace, PVC SQLite)
      ansible.builtin.command: "terraform -chdir={{ terraform_dir }} output -json"
      register: terraform_outputs_raw
      changed_when: false

    - name: Exposer les outputs Terraform comme variables Ansible
      ansible.builtin.set_fact:
        locatic_namespace: "{{ (terraform_outputs_raw.stdout | from_json).namespace.value }}"
        locatic_sqlite_pvc: "{{ (terraform_outputs_raw.stdout | from_json).sqlite_pvc_name.value }}"

    - name: Afficher les valeurs récupérées (preuve du lien Terraform -> Ansible)
      ansible.builtin.debug:
        msg:
          - "Namespace Kubernetes : {{ locatic_namespace }}"
          - "PVC SQLite : {{ locatic_sqlite_pvc }}"

    # --- 3. Identifiants GHCR (jamais committés) --------------------------
    - name: Lire les identifiants GHCR depuis l'environnement
      ansible.builtin.set_fact:
        ghcr_username: "{{ lookup('env', 'GHCR_USERNAME') }}"
        ghcr_token: "{{ lookup('env', 'GHCR_TOKEN') }}"
      no_log: true

    - name: Vérifier que les identifiants GHCR sont bien fournis
      ansible.builtin.assert:
        that:
          - ghcr_username | length > 0
          - ghcr_token | length > 0
        fail_msg: >-
          GHCR_USERNAME et GHCR_TOKEN doivent être exportés avant de lancer
          ce playbook (export GHCR_USERNAME=... GHCR_TOKEN=...), pour créer
          le secret d'accès à l'image privée.
        success_msg: "Identifiants GHCR trouvés dans l'environnement."

    # --- 4. Rendu et application des manifestes Kubernetes -----------------
    # Le secret est appliqué à part, avec no_log, pour ne jamais faire
    # apparaître les identifiants GHCR dans la sortie du playbook. Les
    # autres ressources restent visibles pour un débogage normal.
    - name: Rendre et appliquer le secret GHCR
      kubernetes.core.k8s:
        state: present
        namespace: "{{ locatic_namespace }}"
        context: "{{ kube_context }}"
        definition: "{{ lookup('template', kubernetes_manifests_dir + '/secret-ghcr.yaml.j2') | from_yaml }}"
      no_log: true

    # `find` ne garantit pas un ordre alphabétique : on applique donc les
    # ConfigMaps/Secrets explicitement AVANT les Deployments qui les
    # montent, sinon un pod peut démarrer avec une config pas encore à
    # jour (vécu concrètement : Nginx démarré avant que le ConfigMap
    # contienne /nginx_status, jamais rechargé depuis).
    - name: Lister les ConfigMaps/Secrets Kubernetes
      ansible.builtin.find:
        paths: "{{ kubernetes_manifests_dir }}"
        patterns:
          - "configmap-*.yml.j2"
          - "configmap-*.yaml.j2"
        recurse: true
      register: k8s_config_templates

    - name: Rendre et appliquer les ConfigMaps/Secrets
      kubernetes.core.k8s:
        state: present
        namespace: "{{ locatic_namespace }}"
        context: "{{ kube_context }}"
        definition: "{{ lookup('template', item.path) | from_yaml }}"
      loop: "{{ k8s_config_templates.files }}"
      loop_control:
        label: "{{ item.path | basename }}"
      when: k8s_config_templates.matched > 0

    - name: Lister les Deployments/Services Kubernetes
      ansible.builtin.find:
        paths: "{{ kubernetes_manifests_dir }}"
        patterns:
          - "*.yml.j2"
          - "*.yaml.j2"
        excludes:
          - "secret-ghcr.yaml.j2"
          - "configmap-*.yml.j2"
          - "configmap-*.yaml.j2"
        recurse: true
      register: k8s_workload_templates

    - name: Avertir si aucun autre template Kubernetes n'est encore présent
      ansible.builtin.debug:
        msg: >-
          Aucun template trouvé dans {{ kubernetes_manifests_dir }} (à part
          le secret GHCR et les ConfigMaps).
      when: k8s_workload_templates.matched == 0

    - name: Rendre et appliquer les ressources Kubernetes (Nginx, application, monitoring)
      kubernetes.core.k8s:
        state: present
        namespace: "{{ locatic_namespace }}"
        context: "{{ kube_context }}"
        definition: "{{ lookup('template', item.path) | from_yaml }}"
      loop: "{{ k8s_workload_templates.files }}"
      loop_control:
        label: "{{ item.path | basename }}"
      when: k8s_workload_templates.matched > 0
